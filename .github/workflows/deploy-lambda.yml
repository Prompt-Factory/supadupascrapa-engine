name: Deploy Lambda

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
      LAMBDA_EXECUTION_ROLE_ARN: ${{ secrets.LAMBDA_EXECUTION_ROLE_ARN }}
      LAMBDA_SOURCE_DIR: ${{ vars.LAMBDA_SOURCE_DIR || 'lambdas/hello_world' }}
      LAMBDA_HANDLER: ${{ vars.LAMBDA_HANDLER || 'handler.handler' }}
      LAMBDA_RUNTIME: ${{ vars.LAMBDA_RUNTIME || 'python3.12' }}
      LAMBDA_TIMEOUT: ${{ vars.LAMBDA_TIMEOUT || '30' }}
      LAMBDA_MEMORY_SIZE: ${{ vars.LAMBDA_MEMORY_SIZE || '256' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Lambda artifact
        run: |
          set -euo pipefail
          test -d "$LAMBDA_SOURCE_DIR"
          mkdir -p build/lambda
          cp -R "$LAMBDA_SOURCE_DIR"/. build/lambda/

          if [ -s lambda-requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r lambda-requirements.txt -t build/lambda
          fi

          cd build/lambda
          zip -r ../lambda.zip .

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create or Update Lambda
        run: |
          set -euo pipefail
          if aws lambda get-function --function-name "$LAMBDA_FUNCTION_NAME" >/dev/null 2>&1; then
            echo "Lambda exists. Updating code..."
            aws lambda update-function-code \
              --function-name "$LAMBDA_FUNCTION_NAME" \
              --zip-file "fileb://build/lambda.zip" \
              --publish
          else
            echo "Lambda does not exist. Creating function..."
            aws lambda create-function \
              --function-name "$LAMBDA_FUNCTION_NAME" \
              --runtime "$LAMBDA_RUNTIME" \
              --role "$LAMBDA_EXECUTION_ROLE_ARN" \
              --handler "$LAMBDA_HANDLER" \
              --zip-file "fileb://build/lambda.zip" \
              --timeout "$LAMBDA_TIMEOUT" \
              --memory-size "$LAMBDA_MEMORY_SIZE" \
              --publish
          fi
