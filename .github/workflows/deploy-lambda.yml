name: Deploy Lambda

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      lambda_matrix: ${{ steps.build-matrix.outputs.lambda_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Discover Lambda folders
        id: build-matrix
        env:
          LAMBDA_NAME_PREFIX: ${{ vars.LAMBDA_NAME_PREFIX || '' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          lambdas_root = Path("lambdas")
          prefix = os.getenv("LAMBDA_NAME_PREFIX", "")
          include = []

          for folder in sorted(lambdas_root.iterdir()):
              if not folder.is_dir():
                  continue
              if not (folder / "handler.py").exists():
                  continue
              include.append(
                  {
                      "source_dir": str(folder),
                      "function_name": f"{prefix}{folder.name}",
                  }
              )

          if not include:
              raise SystemExit("No Lambda folders found under lambdas/* with handler.py")

          matrix = json.dumps({"include": include})
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"lambda_matrix={matrix}\n")
          PY

  deploy:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.lambda_matrix) }}
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      LAMBDA_EXECUTION_ROLE_ARN: ${{ secrets.LAMBDA_EXECUTION_ROLE_ARN }}
      LAMBDA_HANDLER: ${{ vars.LAMBDA_HANDLER || 'handler.handler' }}
      LAMBDA_RUNTIME: ${{ vars.LAMBDA_RUNTIME || 'python3.12' }}
      LAMBDA_TIMEOUT: ${{ vars.LAMBDA_TIMEOUT || '900' }}
      LAMBDA_MEMORY_SIZE: ${{ vars.LAMBDA_MEMORY_SIZE || '1024' }}
      LAMBDA_SOURCE_DIR: ${{ matrix.source_dir }}
      LAMBDA_FUNCTION_NAME: ${{ matrix.function_name }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      OUTPUT_S3_BUCKET: ${{ vars.OUTPUT_S3_BUCKET || '' }}
      OUTPUT_S3_PREFIX: ${{ vars.OUTPUT_S3_PREFIX || 'youtube_scraper/' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Lambda artifact
        run: |
          set -euo pipefail
          test -d "$LAMBDA_SOURCE_DIR"
          mkdir -p build/lambda
          cp -R "$LAMBDA_SOURCE_DIR"/. build/lambda/

          if [ -s lambda-requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r lambda-requirements.txt -t build/lambda
          fi

          cd build/lambda
          zip -r ../lambda.zip .

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create or Update Lambda
        run: |
          set -euo pipefail
          echo "Deploying ${LAMBDA_FUNCTION_NAME} from ${LAMBDA_SOURCE_DIR}"
          DESIRED_ENVIRONMENT_JSON="$(python -c 'import json, os; env = {}; [env.__setitem__(k, v) for k in ("YOUTUBE_API_KEY", "OUTPUT_S3_BUCKET", "OUTPUT_S3_PREFIX") if (v := os.getenv(k, "").strip())]; print(json.dumps({"Variables": env}, separators=(",", ":")))' )"
          if aws lambda get-function --function-name "$LAMBDA_FUNCTION_NAME" >/dev/null 2>&1; then
            echo "Lambda exists. Updating code..."
            aws lambda update-function-code \
              --function-name "$LAMBDA_FUNCTION_NAME" \
              --zip-file "fileb://build/lambda.zip" \
              --publish
            aws lambda wait function-updated-v2 \
              --function-name "$LAMBDA_FUNCTION_NAME"
            CURRENT_ENVIRONMENT_JSON="$(aws lambda get-function-configuration \
              --function-name "$LAMBDA_FUNCTION_NAME" \
              --query 'Environment.Variables' \
              --output json)"
            MERGED_ENVIRONMENT_JSON="$(CURRENT_ENVIRONMENT_JSON="$CURRENT_ENVIRONMENT_JSON" python -c 'import json, os; current = json.loads(os.environ["CURRENT_ENVIRONMENT_JSON"]); [current.__setitem__(k, v) for k in ("YOUTUBE_API_KEY", "OUTPUT_S3_BUCKET", "OUTPUT_S3_PREFIX") if (v := os.getenv(k, "").strip())]; print(json.dumps({"Variables": current}, separators=(",", ":")))' )"
            aws lambda update-function-configuration \
              --function-name "$LAMBDA_FUNCTION_NAME" \
              --timeout "$LAMBDA_TIMEOUT" \
              --memory-size "$LAMBDA_MEMORY_SIZE" \
              --environment "$MERGED_ENVIRONMENT_JSON"
            aws lambda wait function-updated-v2 \
              --function-name "$LAMBDA_FUNCTION_NAME"
          else
            echo "Lambda does not exist. Creating function..."
            aws lambda create-function \
              --function-name "$LAMBDA_FUNCTION_NAME" \
              --runtime "$LAMBDA_RUNTIME" \
              --role "$LAMBDA_EXECUTION_ROLE_ARN" \
              --handler "$LAMBDA_HANDLER" \
              --zip-file "fileb://build/lambda.zip" \
              --timeout "$LAMBDA_TIMEOUT" \
              --memory-size "$LAMBDA_MEMORY_SIZE" \
              --environment "$DESIRED_ENVIRONMENT_JSON" \
              --publish
            aws lambda wait function-active-v2 \
              --function-name "$LAMBDA_FUNCTION_NAME"
          fi
